{% extends "layout.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh] text-center px-6">

    <h1 class="text-6xl font-extrabold text-white">
        Chai aur Code
    </h1>

    <p class="mt-4 text-xl text-slate-400 max-w-2xl">
        Learn Django, build amazing projects, and enjoy the perfect cup of chai.
    </p>

    <div class="mt-8 flex gap-4">
        <a href="{% url 'all_chai' %}"
            class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-xl font-semibold transition">
            Explore Chai
        </a>

        <a href="{% url 'chai_stores' %}"
            class="border border-slate-500 text-slate-300 px-6 py-3 rounded-xl hover:bg-slate-800 transition">
            Find Stores
        </a>
    </div>

</div>
{% endblock %}
